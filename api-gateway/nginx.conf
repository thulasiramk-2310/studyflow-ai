events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Logging
    access_log  /var/log/nginx/access.log;
    error_log   /var/log/nginx/error.log;

    # Increase max body size for large file uploads (e.g., 50MB)
    client_max_body_size 50M;

    # Rate limiting for login
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=10r/m;

    upstream study_service {
        server studyflow_study:8000;
    }

    upstream ai_service {
        server studyflow_ai:8002;
    }

    server {
        listen 8000;

        location /auth/login {
            limit_req zone=login_limit burst=5 nodelay;
            proxy_pass http://auth-service:8080/auth/login;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Auth Service
        location /auth/ {
            proxy_pass http://auth-service:8080/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Study Service
        location /api/v1/groups {
            proxy_pass http://study_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/v1/resources {
            proxy_pass http://study_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            # Allow large file uploads
            client_max_body_size 50M;
        }

        location /api/v1/sessions {
            proxy_pass http://study_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # AI Service
        location /api/v1/ai {
            proxy_pass http://ai_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /groups/ {
            proxy_pass http://study-service:8000/groups/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /resources/ {
            proxy_pass http://study-service:8000/resources/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /sessions/ {
            proxy_pass http://study-service:8000/sessions/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # AI Service
        location /ai/ {
            proxy_pass http://studyflow_ai:8002/ai/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
