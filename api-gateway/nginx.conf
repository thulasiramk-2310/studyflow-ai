events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Logging
    access_log  /var/log/nginx/access.log;
    error_log   /var/log/nginx/error.log;

    # Increase max body size for large file uploads (e.g., 50MB)
    client_max_body_size 50M;

    # Rate limiting for login and register
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=register_limit:10m rate=10r/m;

    # Security Headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https:;" always;

    # VPC DNS resolver — required so Cloud Map hostnames (auth/study/ai.studyflow.internal)
    # are re-resolved on each request instead of cached forever at worker startup.
    # Without this, a redeployed upstream task (new IP) leaves the gateway pointing
    # at a dead ENI until the gateway container itself restarts.
    resolver 169.254.169.253 valid=10s;

    server {
        listen 8000;

        # Health check endpoints
        location /health {
            access_log off;
            return 200 "OK";
        }

        location /ready {
            access_log off;
            return 200 "OK";
        }

        location /auth/login {
            limit_req zone=login_limit burst=5 nodelay;
            set $auth_upstream http://auth.studyflow.internal:8080;
            proxy_pass $auth_upstream/auth/login;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /auth/register {
            limit_req zone=register_limit burst=5 nodelay;
            set $auth_upstream http://auth.studyflow.internal:8080;
            proxy_pass $auth_upstream/auth/register;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Auth Service — backend routes already live under /auth/*, so the
        # incoming path is forwarded unchanged (no prefix to strip).
        location /auth/ {
            set $auth_upstream http://auth.studyflow.internal:8080;
            proxy_pass $auth_upstream$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Study Service — backend routes have no /api/v1 prefix, so it must be
        # stripped. `rewrite ... break` + a URI-less proxy_pass is the only way
        # to do that correctly while proxy_pass targets a variable (needed for
        # dynamic DNS re-resolution via the resolver directive above).
        location /api/v1/groups/ {
            set $study_upstream http://study.studyflow.internal:8000;
            rewrite ^/api/v1/(.*)$ /$1 break;
            proxy_pass $study_upstream$uri$is_args$args;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/resources/ {
            set $study_upstream http://study.studyflow.internal:8000;
            rewrite ^/api/v1/(.*)$ /$1 break;
            proxy_pass $study_upstream$uri$is_args$args;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # Allow large file uploads
            client_max_body_size 50M;
        }

        location /api/v1/sessions/ {
            set $study_upstream http://study.studyflow.internal:8000;
            rewrite ^/api/v1/(.*)$ /$1 break;
            proxy_pass $study_upstream$uri$is_args$args;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/users/ {
            set $study_upstream http://study.studyflow.internal:8000;
            rewrite ^/api/v1/(.*)$ /$1 break;
            proxy_pass $study_upstream$uri$is_args$args;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/ai/ {
            set $study_upstream http://study.studyflow.internal:8000;
            rewrite ^/api/v1/(.*)$ /$1 break;
            proxy_pass $study_upstream$uri$is_args$args;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/notifications/ {
            set $study_upstream http://study.studyflow.internal:8000;
            rewrite ^/api/v1/(.*)$ /$1 break;
            proxy_pass $study_upstream$uri$is_args$args;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/search/ {
            set $study_upstream http://study.studyflow.internal:8000;
            rewrite ^/api/v1/(.*)$ /$1 break;
            proxy_pass $study_upstream$uri$is_args$args;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
