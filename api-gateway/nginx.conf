events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Logging
    access_log  /var/log/nginx/access.log;
    error_log   /var/log/nginx/error.log;

    # Increase max body size for large file uploads (e.g., 50MB)
    client_max_body_size 50M;

    # Rate limiting for login
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=10r/m;

    server {
        listen 8000;

        location /auth/login {
            limit_req zone=login_limit burst=5 nodelay;
            proxy_pass http://auth-service:8080/auth/login;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Auth Service
        location /auth/ {
            proxy_pass http://auth-service:8080/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Study Service (Groups and Resources)
        location /groups/ {
            proxy_pass http://study-service:8000/groups/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /resources/ {
            proxy_pass http://study-service:8000/resources/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /sessions/ {
            proxy_pass http://study-service:8000/sessions/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # AI Service (Future)
        #location /ai/ {
        #    proxy_pass http://ai-service:8002/ai/;
        #    proxy_set_header Host $host;
        #    proxy_set_header X-Real-IP $remote_addr;
        #    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        #}
    }
}
