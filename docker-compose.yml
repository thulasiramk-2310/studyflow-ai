version: '3.8'

services:
  # Database for Study Service, Auth Service, and AI Service
  postgres:
    image: postgres:15-alpine
    container_name: studyflow_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-studyflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-studyflow}
      POSTGRES_DB: ${POSTGRES_DB:-studyflow_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studyflow -d studyflow_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Spring Boot Auth Service
  auth-service:
    build:
      context: ./auth-service
    container_name: studyflow_auth
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=studyflow_db
      - DB_USER=studyflow
      - DB_PASSWORD=studyflow
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy

  # Study Service
  study-service:
    build:
      context: ./study-service
    container_name: studyflow_study
    ports:
      - "${STUDY_SERVICE_PORT:-8081}:8000"
    environment:
      - DATABASE_URL=postgresql://studyflow:studyflow@postgres:5432/studyflow_db
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - ./study-service/alembic:/app/alembic
      - shared_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  # AI Service
  ai-service:
    build:
      context: ./ai-service
    container_name: studyflow_ai
    ports:
      - "8002:8002"
    environment:
      - DATABASE_URL=postgresql://studyflow:studyflow@postgres:5432/studyflow_db
      - STUDY_SERVICE_URL=http://study-service:8000
    volumes:
      - shared_uploads:/app/uploads
      - ai_storage:/app/ai-storage
    depends_on:
      postgres:
        condition: service_healthy

  # Ollama for local LLM
  ollama:
    image: ollama/ollama
    container_name: studyflow_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Note: A startup script or manual step will be needed to `ollama pull qwen3:8b` later.

  # API Gateway
  api-gateway:
    image: nginx:alpine
    container_name: studyflow_gateway
    ports:
      - "8000:8000"
    volumes:
      - ./api-gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - study-service
      - ai-service

volumes:
  postgres_data:
  ollama_data:
  shared_uploads:
  ai_storage:
