version: '3.8'

services:
  # Database for Study Service, Auth Service, and AI Service
  postgres:
    image: postgres:15-alpine
    container_name: studyflow_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-studyflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-studyflow}
      POSTGRES_DB: ${POSTGRES_DB:-studyflow_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studyflow -d studyflow_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Spring Boot Auth Service
  auth-service:
    build:
      context: ./auth-service
    container_name: studyflow_auth
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=studyflow_db
      - DB_USER=studyflow
      - DB_PASSWORD=studyflow
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy

  # Ollama for local LLM
  ollama:
    image: ollama/ollama
    container_name: studyflow_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Note: A startup script or manual step will be needed to `ollama pull qwen3:8b` later.

volumes:
  postgres_data:
  ollama_data:
