server:
  port: ${AUTH_SERVICE_PORT:8080}

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:studyflow}
    username: ${DB_USER:studyflow}
    password: ${DB_PASSWORD:studyflow}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: ${JWT_SECRET}

internal:
  api:
    key: ${INTERNAL_API_KEY}

springdoc:
  swagger-ui:
    path: /auth/docs
  api-docs:
    path: /auth/v3/api-docs
