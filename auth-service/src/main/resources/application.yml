server:
  port: ${AUTH_SERVICE_PORT:8080}

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:studyflow_db}
    username: ${DB_USER:studyflow}
    password: ${DB_PASSWORD:studyflow}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: ${JWT_SECRET:default_secret_key_for_local_development_needs_to_be_long_enough}

internal:
  api:
    key: ${INTERNAL_API_KEY:dev_internal_key_change_me}

springdoc:
  swagger-ui:
    path: /auth/docs
  api-docs:
    path: /auth/v3/api-docs
